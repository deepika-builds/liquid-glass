<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>liquid-glass demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0a0a12; color: #f5f5f7; overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* colorful backdrop so the refraction has something to bend */
  .mesh { position: fixed; inset: 0; filter: blur(55px) saturate(1.6); }
  .blob {
    position: absolute; border-radius: 50%; opacity: 0.95;
    width: max(55vmin, 380px); aspect-ratio: 1;
    transform: translate(-50%, -50%);
  }
  .blob:nth-child(1) { left: 14%; top: 10%; background: radial-gradient(circle, #ff5e7e, transparent 70%); }
  .blob:nth-child(2) { left: 88%; top: 24%; background: radial-gradient(circle, #4d9fff, transparent 70%); }
  .blob:nth-child(3) { left: 26%; top: 86%; background: radial-gradient(circle, #9d5cff, transparent 70%); }
  .blob:nth-child(4) { left: 80%; top: 72%; background: radial-gradient(circle, #2fd4a7, transparent 70%); }
  .bg-type {
    position: fixed; inset: 0; display: grid; place-items: center;
    font-size: clamp(120px, 30vw, 420px); font-weight: 800;
    color: rgba(255, 255, 255, 0.10); user-select: none; pointer-events: none;
  }

  /* the glass material — see README for the recipe */
  .glass {
    position: fixed; left: 50%; top: 50%;
    width: min(340px, calc(100vw - 32px));
    transform: translate(-50%, -50%);
    padding: 26px 24px;
    border-radius: 28px;
    background: linear-gradient(180deg, rgba(14, 14, 22, 0.18), rgba(14, 14, 22, 0.32));
    box-shadow:
      0 24px 60px rgba(0, 0, 0, 0.45),
      inset 0 1px 1px rgba(255, 255, 255, 0.5),
      inset 0 -8px 20px rgba(255, 255, 255, 0.06),
      inset 0 0 0 1px rgba(255, 255, 255, 0.13);
    cursor: grab; touch-action: none; will-change: transform;
  }
  .glass:active { cursor: grabbing; }
  .glass h1 { font-size: 22px; font-weight: 700; }
  .glass p { margin-top: 8px; font-size: 14px; line-height: 1.5; color: rgba(245,245,247,0.65); }
  .glass .row { margin-top: 18px; display: flex; gap: 10px; }
  .glass input {
    flex: 1; min-width: 0; padding: 12px 14px; border-radius: 13px;
    border: 1px solid rgba(255,255,255,0.18); background: rgba(255,255,255,0.09);
    color: inherit; font: 500 14px/1.2 inherit; outline: none; cursor: text;
  }
  .glass input:focus { border-color: rgba(255,255,255,0.5); }
  .glass button {
    padding: 12px 18px; border: none; border-radius: 13px; cursor: pointer;
    background: #f5f5f7; color: #0a0a12; font: 600 14px/1.2 inherit;
  }
</style>
</head>
<body>
  <div class="mesh" aria-hidden="true"><div class="blob"></div><div class="blob"></div><div class="blob"></div><div class="blob"></div></div>
  <div class="bg-type" aria-hidden="true">Aa</div>

  <div class="glass" id="glass">
    <h1>Liquid glass</h1>
    <p>Drag this card around — the backdrop bends at the rim and stays crisp in the middle.</p>
    <div class="row">
      <input type="email" placeholder="you@example.com" aria-label="Email">
      <button type="button">Join</button>
    </div>
  </div>

  <script src="../liquid-glass.js"></script>
  <script>
    const el = document.getElementById("glass");
    liquidGlass(el);

    // minimal drag (grab anywhere except the input/button)
    let sx, sy, ox, oy, dragging = false;
    el.addEventListener("pointerdown", (e) => {
      if (e.target.closest("input, button")) return;
      dragging = true;
      sx = e.clientX; sy = e.clientY;
      const r = el.getBoundingClientRect();
      ox = r.left + r.width / 2; oy = r.top + r.height / 2;
      try { el.setPointerCapture(e.pointerId); } catch (_) {}
    });
    el.addEventListener("pointermove", (e) => {
      if (!dragging) return;
      el.style.left = ox + (e.clientX - sx) + "px";
      el.style.top = oy + (e.clientY - sy) + "px";
    });
    el.addEventListener("pointerup", () => { dragging = false; });
    el.addEventListener("pointercancel", () => { dragging = false; });
  </script>
</body>
</html>
